### CENTER BOX STYLE -----------------------------------------------------------------------------------

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    color = rgb(255, 200, 200, 1)
}

label {
    monitor =
    text = user
    color = rgb(114, 133, 162)
    font_size = 14
    font_family = Unifont
    position = -88, 100
    halign = center
    valign = center
}
label {
    monitor =
    text = pineapple
    color = rgb(255, 44, 66)
    font_size = 14
    font_family = Unifont
    position = -3, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = passwd?
    color = rgb(114, 133, 162)
    font_size = 14
    font_family = Unifont
    position = -100, 60
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 190, 30
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 1
    dots_fade_time = -100
    dots_rounding = -2
    dots_center = false
    fade_on_empty = false
    fade_timeout = 0
    
    font_family = Terminus
    font_color = rgb(255, 200, 200)
    # font_color = rgb(255, 255, 255)
    inner_color = rgba(17, 17, 17, 0)
    outer_color = rgb(255, 200, 200)
    rounding = 0
    border_color = rgb(255, 200, 200)

    placeholder_text =
    
    position = 42, 60
    halign = center
    valign = center

    fail_text = ---------------------------------
    fail_color = rgba(220, 100, 100, 0)
    check_color = rgba(70, 70, 70, 0)
}
shape {
    monitor =
    size = 360, 180
    color = rgba(17, 17, 17, 1.0)
    rounding = 0
    rotate = 0
    border_color = rgb(255, 255, 255)	
    border_size = 1

    position = 0, 80
    halign = center
    valign = center
}
shape {
    monitor =
    size = 175, 1
    # color = rgb(255, 200, 200)
    color = rgb(255, 255, 255)
    rounding = 0
    
    position = 43, 50
    halign = center
    valign = center
}
